apiVersion: 1

policies:
  - orgId: 1
    receiver: webhook-default
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: pagerduty-critical
        match:
          severity: critical
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 1h

      - receiver: slack-alerts
        match:
          severity: warning
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

      - receiver: pagerduty-critical
        match:
          alertname: ServiceDown
        group_wait: 0s
        group_interval: 1m
        repeat_interval: 30m

muteTimes: []
templates: []
