# =============================================================================
# DEPRECATED: Prometheus Alert Rules
# =============================================================================
# 
# WARNING: These alert rules are deprecated as of Phase 3.3 migration.
# 
# Please use Grafana Unified Alerting instead. The rules below are kept
# for a 1-sprint fallback period only and will be removed in a future release.
#
# New alerting configuration location:
#   - Contact Points: grafana/provisioning/alerting/contact-points.yml
#   - Notification Policies: grafana/provisioning/alerting/notification-policies.yml
#   - Alert Rules: grafana/provisioning/alerting/rules/ecommerce-agent.yml
#
# Migration Date: Auto-generated
# Target Removal: 1 sprint from migration date
# =============================================================================

groups:
  - name: ecommerce_agent_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(chat_errors_total[5m]) / rate(chat_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High chat error rate detected"
          description: "Error rate is above 1% for more than 2 minutes."

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, rate(chat_latency_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Chat p95 latency is high"
          description: "p95 chat latency exceeds 2 seconds for more than 3 minutes."

      - alert: HighHumanTransferRate
        expr: rate(human_transfers_total[5m]) / rate(chat_requests_total[5m]) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High human transfer rate"
          description: "More than 30% of requests are being transferred to humans."

      - alert: LowConfidenceScore
        expr: histogram_quantile(0.5, rate(confidence_score_bucket[5m])) < 0.6
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Median confidence score is low"
          description: "Median confidence score has dropped below 0.6."

      - alert: LowIntentAccuracy
        expr: intent_accuracy < 0.7
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Intent accuracy is critically low"
          description: "Intent classification accuracy is below 70%."

      - alert: HighHallucinationRate
        expr: hallucination_rate > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High hallucination rate detected"
          description: "Hallucination rate exceeds 5%."

      - alert: LowRagPrecision
        expr: rag_precision < 0.6
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "RAG precision is low"
          description: "RAG retrieval precision has dropped below 60%."

      - alert: ServiceDown
        expr: up{job="ecommerce-agent"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "E-commerce Smart Agent is down"
          description: "The /metrics endpoint has been unreachable for more than 1 minute."
