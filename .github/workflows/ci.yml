name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: knowledge_base
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.16.3
        options: >-
          --health-cmd "/bin/bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6333:6333

    env:
      # Application
      PROJECT_NAME: E-commerce Smart Agent
      API_V1_STR: /api/v1
      ENABLE_OPENAPI_DOCS: "False"
      CORS_ORIGINS: "http://localhost:5173"

      # Database
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge_base

      # Redis
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""

      # Qdrant
      QDRANT_URL: http://localhost:6333
      QDRANT_API_KEY: ""

      # LLM (dummy values for tests)
      OPENAI_API_KEY: sk-test
      OPENAI_BASE_URL: http://localhost:8000/v1
      DASHSCOPE_API_KEY: ""

      # Security
      SECRET_KEY: test-secret-key-at-least-32-bytes-long-123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.5"

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d postgres -c "CREATE DATABASE test_knowledge_base;"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check app tests

      - name: Run evaluation tests (tests/evaluation/)
        run: uv run pytest tests/evaluation/ -v -s
        env:
          OPENAI_API_KEY: sk-test
          OPENAI_BASE_URL: http://localhost:8000/v1
          DASHSCOPE_API_KEY: ""

      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-fail-under=75
