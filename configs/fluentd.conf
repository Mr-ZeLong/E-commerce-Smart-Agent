# Fluentd configuration for E-commerce Smart Agent structured logs
# This configuration reads JSON logs and forwards them to Grafana Loki

# Source: tail JSON log files from the application
<source>
  @type tail
  @id ecommerce_agent_logs
  path /var/log/ecommerce-agent/*.json.log,/var/log/ecommerce-agent/app.log
  pos_file /var/log/fluentd/ecommerce-agent.log.pos
  tag ecommerce.agent
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%dT%H:%M:%S.%N%z
    keep_time_key true
  </parse>
</source>

# Source: tail uvicorn access logs
<source>
  @type tail
  @id ecommerce_agent_access
  path /var/log/ecommerce-agent/access.log
  pos_file /var/log/fluentd/ecommerce-agent-access.log.pos
  tag ecommerce.agent.access
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%dT%H:%M:%S.%N%z
    keep_time_key true
  </parse>
</source>

# Filter: add service metadata
<filter ecommerce.agent>
  @type record_transformer
  <record>
    service ecommerce-smart-agent
    environment ${ENV['ENVIRONMENT'] || 'production'}
    hostname ${hostname}
  </record>
</filter>

# Filter: enrich with Kubernetes metadata (if running in K8s)
# Uncomment if deployed in Kubernetes
# <filter ecommerce.agent>
#   @type kubernetes_metadata
# </filter>

# Output: Grafana Loki
# Using the fluent-plugin-grafana-loki plugin
<match ecommerce.agent>
  @type loki
  @id loki_output
  url http://loki:3100
  # username loki
  # password secret
  # tenant_id ecommerce-agent

  extra_labels {"job":"ecommerce-agent","source":"fluentd"}
  label_keys level,logger,correlation_id,trace_id,service,environment
  line_format json

  <buffer>
    @type memory
    flush_interval 1s
    flush_mode interval
    chunk_limit_size 1m
    queue_limit_length 32
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>

# Output: also write to stdout for debugging (optional)
# <match ecommerce.agent>
#   @type stdout
# </match>

# System settings
<system>
  log_level info
  workers 2
</system>
