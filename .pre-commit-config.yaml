repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty type checker
        entry: ty check --error-on-warning
        language: system
        types: [python]
        pass_filenames: true
        exclude: '^\.opencode/skills/'
