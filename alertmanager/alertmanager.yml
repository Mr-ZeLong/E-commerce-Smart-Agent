global:
  smtp_smarthost: '${SMTP_HOST:-localhost:587}'
  smtp_from: '${ALERT_EMAIL_FROM:-alerts@example.com}'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'email-team'
      continue: true
    - match:
        channel: webhook
      receiver: 'webhook-default'
      continue: true

receivers:
  - name: 'default'
    email_configs:
      - to: '${ALERT_ADMIN_EMAILS:-oncall@example.com}'
        subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        send_resolved: true

  - name: 'email-team'
    email_configs:
      - to: '${ALERT_ADMIN_EMAILS:-oncall@example.com}'
        send_resolved: true

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        severity: critical
        send_resolved: true

  - name: 'webhook-default'
    webhook_configs:
      - url: '${ALERT_WEBHOOK_URL:-http://localhost:8000/api/v1/admin/alerts/webhook}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
